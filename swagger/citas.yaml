openapi: 3.0.3
info:
  title: Dates Matching API - Citas
  version: 1.0.0
  description: Endpoints del modulo de citas.

paths:
  /api/citas:
    get:
      tags:
        - Citas
      security:
        - bearerAuth: []
      summary: Listar historial de citas
      responses:
        '200':
          description: Historial de citas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Cita'
    post:
      tags:
        - Citas
      security:
        - bearerAuth: []
      summary: Iniciar una nueva cita
      description: |
        Registra los swipes de un usuario autenticado para una fecha.
        Los arrays `peliculas` y `comidas` pueden venir vacios (`[]`) para indicar
        que ese tipo de plan no aplica en la cita.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCitaRequest'
            examples:
              nuevaCita:
                value:
                  fecha: 2026-03-15T21:00:00.000Z
                  tipo_cita: noche_de_pelicula
                  peliculas:
                    - Inception
                    - Interstellar
                  comidas:
                    - Sushi
                    - Tequenos
              citaSinPeliculas:
                value:
                  fecha: 2026-03-15T21:00:00.000Z
                  tipo_cita: cena_en_casa
                  peliculas: []
                  comidas:
                    - Sushi
                    - Tequenos
      responses:
        '201':
          description: Cita creada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cita'
        '400':
          description: Request invalido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/citas/{id}:
    get:
      tags:
        - Citas
      security:
        - bearerAuth: []
      summary: Obtener detalle de una cita
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            example: 1
      responses:
        '200':
          description: Detalle de la cita
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cita'
        '404':
          description: Cita no encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags:
        - Citas
      security:
        - bearerAuth: []
      summary: Edicion manual de resultados finales (admin)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateResultadoCitaRequest'
            examples:
              cambioManual:
                value:
                  resultado_pelicula: Interstellar
                  resultado_comida: Tequenos
      responses:
        '200':
          description: Cita actualizada manualmente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cita'
        '400':
          description: Request invalido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Cita no encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags:
        - Citas
      security:
        - bearerAuth: []
      summary: Eliminar cita por id
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            example: 1
      responses:
        '200':
          description: Cita eliminada
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Cita eliminada correctamente
        '404':
          description: Cita no encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/citas/{id}/voto:
    post:
      tags:
        - Citas
      security:
        - bearerAuth: []
      summary: Emitir voto final de pelicula y comida
      description: |
        Registra el voto final de un usuario para una cita.
        Si ambos usuarios ya votaron, aplica la logica Muerte Subita:
        - Telepatia: si coinciden votos, se usa ese resultado.
        - Ruleta: si no coinciden, se elige aleatoriamente entre ambas opciones.
        Los campos `pelicula` y `comida` solo son necesarios cuando esa categoria
        tiene mas de una opcion en match. Si el match de una categoria es `[]`,
        se ignora en Muerte Subita.
      parameters:
        - in: path
          name: id
          required: true
          description: ID numerico de la cita
          schema:
            type: integer
            example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmitirVotoFinalRequest'
      responses:
        '200':
          description: Voto registrado o cita finalizada con resultado calculado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmitirVotoFinalResponse'
        '400':
          description: Request invalido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Usuario no autorizado para votar
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Cita o usuario no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: La cita ya fue finalizada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    CreateCitaRequest:
      type: object
      required:
        - fecha
        - tipo_cita
        - peliculas
        - comidas
      properties:
        fecha:
          type: string
          format: date-time
        tipo_cita:
          type: string
          example: noche_de_pelicula
        peliculas:
          type: array
          minItems: 0
          items:
            type: string
          example: [Inception, Interstellar]
        comidas:
          type: array
          minItems: 0
          items:
            type: string
          example: [Sushi, Tequenos]

    UpdateResultadoCitaRequest:
      type: object
      properties:
        resultado_pelicula:
          type: string
          nullable: true
          example: Interstellar
        resultado_comida:
          type: string
          nullable: true
          example: Tequenos

    EmitirVotoFinalRequest:
      type: object
      required:
        - usuarioId
      properties:
        usuarioId:
          type: integer
          example: 1
        pelicula:
          type: string
          nullable: true
          description: Requerido solo si `peliculas_match` tiene mas de una opcion.
          example: Inception
        comida:
          type: string
          nullable: true
          description: Requerido solo si `comidas_match` tiene mas de una opcion.
          example: Sushi

    EmitirVotoFinalResponse:
      type: object
      properties:
        message:
          type: string
          example: Ambos votaron. Resultado final calculado con Muerte Subita.
        cita:
          $ref: '#/components/schemas/Cita'

    Cita:
      type: object
      properties:
        id:
          type: integer
          example: 1
        fecha:
          type: string
          format: date-time
          example: 2026-03-09T20:00:00.000Z
        tipo_cita:
          type: string
          example: cine_y_comida
        estado:
          type: string
          enum: [esperando_pareja, muerte_subita, finalizada]
          example: finalizada
        peliculas_match:
          type: array
          items:
            type: string
          example: [Inception, Interstellar]
        comidas_match:
          type: array
          items:
            type: string
          example: [Sushi, Pizza]
        voto_jesus_pelicula:
          type: string
          nullable: true
        voto_jesus_comida:
          type: string
          nullable: true
        voto_piera_pelicula:
          type: string
          nullable: true
        voto_piera_comida:
          type: string
          nullable: true
        resultado_pelicula:
          type: string
          nullable: true
        resultado_comida:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: Error interno del servidor
