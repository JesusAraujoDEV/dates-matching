openapi: 3.0.3
info:
  title: Dates Matching API - Auth
  version: 1.0.0
  description: Endpoints de autenticacion.

paths:
  /api/auth/login:
    post:
      tags:
        - Auth
      summary: Login y generacion de JWT
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            examples:
              jesus:
                value:
                  nombre: Jesus
                  password: passJesus123
      responses:
        '200':
          description: Login exitoso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          description: Request invalido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Credenciales invalidas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/auth/me:
    get:
      tags:
        - Auth
      summary: Obtener usuario autenticado
      security:
        - bearerAuth: []
      description: Devuelve los datos del usuario autenticado en base al JWT.
      responses:
        '200':
          description: Usuario autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          description: Token ausente o invalido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Usuario no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    LoginRequest:
      type: object
      required:
        - nombre
        - password
      properties:
        nombre:
          type: string
          example: Jesus
        password:
          type: string
          example: passJesus123

    LoginResponse:
      type: object
      properties:
        token:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        user:
          $ref: '#/components/schemas/AuthTokenUser'

    AuthTokenUser:
      type: object
      properties:
        id:
          type: integer
          example: 1
        nombre:
          type: string
          example: Jesus

    User:
      type: object
      properties:
        id:
          type: integer
          example: 1
        nombre:
          type: string
          example: Jesus
        telefono:
          type: string
          example: '+34123456789'

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: Credenciales invalidas
