openapi: 3.0.3
info:
  title: Dates Matching API - Users
  version: 1.0.0
  description: Endpoints del modulo de usuarios.

paths:
  /api/users:
    get:
      tags:
        - Users
      summary: Listar usuarios
      security:
        - bearerAuth: []
      description: Devuelve usuarios sin incluir password.
      responses:
        '200':
          description: Lista de usuarios obtenida correctamente
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
        '401':
          description: No autorizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
          example: 1
        nombre:
          type: string
          example: Jesus
        telefono:
          type: string
          example: '+34123456789'
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: Token no proporcionado
